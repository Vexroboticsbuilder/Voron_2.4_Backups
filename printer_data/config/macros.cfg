################
## LED MACROS ##
################

[led_effect rainbow]
leds:
  neopixel:chamber
  neopixel:tool0 
  neopixel:tool1 
  neopixel:tool2 
  neopixel:tool3 
  neopixel:tool4 
  neopixel:tool5 
layers:
  gradient 1 1 top (1,0,0),(0,1,0),(0,0,1)
autostart: false
frame_rate: 18

[gcode_macro Rainbow_Lights]
gcode:
  SET_LED_EFFECT EFFECT=rainbow REPLACE=1
  SET_PIN PIN=caselight VALUE=0


[led_effect bright]
leds:
  neopixel:chamber
  neopixel:tool0
  neopixel:tool1
  neopixel:tool2
  neopixel:tool3
  neopixel:tool4
  neopixel:tool5
layers:
  static 1 1 top (1,1,1)
autostart: false
frame_rate: 24

[gcode_macro Printing_Lights]
gcode:
  SET_LED_EFFECT EFFECT=bright REPLACE=1
  SET_PIN PIN=caselight VALUE=1.00


[led_effect heating]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (1,0.702,0),(1,0.5176,0),(1,0,0)
autostart: false
frame_rate: 18

[gcode_macro Heating_Lights]
gcode:
  SET_LED_EFFECT EFFECT=heating REPLACE=1
  SET_LED_EFFECT EFFECT=T0_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T1_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T2_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T3_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T4_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T5_heating REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1



[led_effect cooling]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0,1,1),(0.53,0.94,1),(0,0,1)
autostart: false
frame_rate: 18

[gcode_macro Cooling_Lights]
gcode:
  SET_LED_EFFECT EFFECT=cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T0_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T1_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T2_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T3_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T4_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T5_cooling REPLACE=1
  SET_PIN PIN=caselight VALUE=0.05




[led_effect error]
leds:
    neopixel:chamber
    neopixel:tool0
    neopixel:tool1
    neopixel:tool2
    neopixel:tool3
    neopixel:tool4
    neopixel:tool5
layers:
    breathing      5  0     add (0.3, 0.0, 0.0)
    twinkle        5 0.1  top   (0.5,0,0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true


[gcode_macro Error_Lights]
gcode:
  SET_LED_EFFECT EFFECT=error REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1


[led_effect wrainbow]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0.5,0.15,0.15),(0.15,0.5,0.15),(0.15,0.15,0.5)
autostart: false
frame_rate: 18

[gcode_macro Pastel_Lights]
gcode:
  SET_LED_EFFECT EFFECT=wrainbow REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1



[led_effect off]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0,0,0),(0,0,0),(0,0,0)
autostart: false
frame_rate: 1

[gcode_macro Lights_Off]
gcode:
  SET_LED_EFFECT EFFECT=off REPLACE=1
  SET_LED_EFFECT EFFECT=T0_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T1_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T2_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T3_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T4_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T5_ideling REPLACE=0
  SET_PIN PIN=caselight VALUE=0.00





###################################
## MISC MACROS (OFTEN TEMPORARY) ##
###################################


[gcode_macro Preheat_ABS]
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder4 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder5 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=105
    Heating_Lights

[gcode_macro ABS]
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=245
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=245
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=245
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=245
    SET_HEATER_TEMPERATURE HEATER=extruder4 TARGET=245
    SET_HEATER_TEMPERATURE HEATER=extruder5 TARGET=245
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=105
    Heating_Lights


[gcode_macro Preheat_PLA]
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder4 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=extruder5 TARGET=150
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=55
    Heating_Lights

[gcode_macro PLA]
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=200
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=200
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=200
    SET_HEATER_TEMPERATURE HEATER=extruder4 TARGET=200
    SET_HEATER_TEMPERATURE HEATER=extruder5 TARGET=200
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=55
    Heating_Lights

[gcode_macro Cool_Down]
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=0
    SET_HEATER_TEMPERATURE HEATER=extruder2 TARGET=0
    SET_HEATER_TEMPERATURE HEATER=extruder3 TARGET=0
    SET_HEATER_TEMPERATURE HEATER=extruder4 TARGET=0
    SET_HEATER_TEMPERATURE HEATER=extruder5 TARGET=0
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
    Cooling_Lights