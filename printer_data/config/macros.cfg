################
## LED MACROS ##
################

[led_effect rainbow]
leds:
  neopixel:chamber
  neopixel:tool0 
  neopixel:tool1 
  neopixel:tool2 
  neopixel:tool3 
  neopixel:tool4 
  neopixel:tool5 
layers:
  gradient 1 1 top (1,0,0),(0,1,0),(0,0,1)
autostart: false
frame_rate: 18

[gcode_macro Rainbow_Lights]
gcode:
  SET_LED_EFFECT EFFECT=rainbow REPLACE=1
  SET_PIN PIN=caselight VALUE=0


[led_effect bright]
leds:
  neopixel:chamber
  neopixel:tool0
  neopixel:tool1
  neopixel:tool2
  neopixel:tool3
  neopixel:tool4
  neopixel:tool5
layers:
  static 1 1 top (1,1,1)
autostart: false
frame_rate: 24

[gcode_macro Printing_Lights]
gcode:
  SET_LED_EFFECT EFFECT=bright REPLACE=1
  SET_PIN PIN=caselight VALUE=1.00


[led_effect heating]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (1,0.702,0),(1,0.5176,0),(1,0,0)
autostart: false
frame_rate: 18

[gcode_macro Heating_Lights]
gcode:
  SET_LED_EFFECT EFFECT=heating REPLACE=1
  SET_LED_EFFECT EFFECT=T0_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T1_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T2_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T3_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T4_heating REPLACE=1
  SET_LED_EFFECT EFFECT=T5_heating REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1



[led_effect cooling]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0,1,1),(0.53,0.94,1),(0,0,1)
autostart: false
frame_rate: 18

[gcode_macro Cooling_Lights]
gcode:
  SET_LED_EFFECT EFFECT=cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T0_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T1_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T2_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T3_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T4_cooling REPLACE=1
  SET_LED_EFFECT EFFECT=T5_cooling REPLACE=1
  SET_PIN PIN=caselight VALUE=0.05




[led_effect error]
leds:
    neopixel:chamber
    neopixel:tool0
    neopixel:tool1
    neopixel:tool2
    neopixel:tool3
    neopixel:tool4
    neopixel:tool5
layers:
    breathing      5  0     add (0.3, 0.0, 0.0)
    twinkle        5 0.1  top   (0.5,0,0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true


[gcode_macro Error_Lights]
gcode:
  SET_LED_EFFECT EFFECT=error REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1


[led_effect wrainbow]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0.5,0.15,0.15),(0.15,0.5,0.15),(0.15,0.15,0.5)
autostart: false
frame_rate: 18

[gcode_macro Pastel_Lights]
gcode:
  SET_LED_EFFECT EFFECT=wrainbow REPLACE=1
  SET_PIN PIN=caselight VALUE=0.1



[led_effect off]
leds:
  neopixel:chamber
layers:
  gradient 1 1 top (0,0,0),(0,0,0),(0,0,0)
autostart: false
frame_rate: 1

[gcode_macro Lights_Off]
gcode:
  SET_LED_EFFECT EFFECT=off REPLACE=1
  SET_LED_EFFECT EFFECT=T0_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T1_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T2_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T3_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T4_ideling REPLACE=0
  SET_LED_EFFECT EFFECT=T5_ideling REPLACE=0
  SET_PIN PIN=caselight VALUE=0.00



##########################
## SpoolMan Toolchanger ##
##########################
[gcode_macro _TOOL_SPOOL_MAP]
variable_t0_spool: -1
variable_t1_spool: -1
variable_t2_spool: -1
variable_t3_spool: -1
variable_t4_spool: -1
variable_t5_spool: -1
gcode:
  # Container only

[gcode_macro ASSIGN_SPOOL]
description: Assign a Spoolman ID to a specific Tool (e.g. TOOL=0 ID=42)
gcode:
  {% set tool = params.TOOL|default(-1)|int %}
  {% set id = params.ID|default(-1)|int %}
  
  {% if tool >= 0 and tool <= 5 %}
    # FIXED: Changed VARIABLE name to match the map (tX_spool)
    SET_GCODE_VARIABLE MACRO=_TOOL_SPOOL_MAP VARIABLE=t{tool}_spool VALUE={id}
    {action_respond_info("Tool T" ~ tool ~ " is now linked to Spool ID: " ~ id)}
  {% else %}
    {action_respond_info("Error: Tool must be between 0 and 5")}
  {% endif %}

[gcode_macro _UPDATE_SPOOLMAN_ACTIVE]
gcode:
  {% set tool = params.TOOL|int %}
  # FIXED: Changed variable key to match the map (tX_spool)
  {% set id = printer["gcode_macro _TOOL_SPOOL_MAP"]["t" ~ tool ~ "_spool"] %}
  
  {% if id > -1 %}
    SET_ACTIVE_SPOOL ID={id}
  {% else %}
    CLEAR_ACTIVE_SPOOL
  {% endif %}

[gcode_macro CHECK_TOOLS]
description: Lists all 6 tools and their current Spoolman ID assignments
gcode:
  {action_respond_info("--- StealthChanger Spool Assignments ---")}
  
  # Pull the values into local names to keep Klipper happy
  {% set t0 = printer["gcode_macro _TOOL_SPOOL_MAP"].t0_spool %}
  {% set t1 = printer["gcode_macro _TOOL_SPOOL_MAP"].t1_spool %}
  {% set t2 = printer["gcode_macro _TOOL_SPOOL_MAP"].t2_spool %}
  {% set t3 = printer["gcode_macro _TOOL_SPOOL_MAP"].t3_spool %}
  {% set t4 = printer["gcode_macro _TOOL_SPOOL_MAP"].t4_spool %}
  {% set t5 = printer["gcode_macro _TOOL_SPOOL_MAP"].t5_spool %}

  {action_respond_info("T0: ID %s" % (t0 if t0 > -1 else "EMPTY"))}
  {action_respond_info("T1: ID %s" % (t1 if t1 > -1 else "EMPTY"))}
  {action_respond_info("T2: ID %s" % (t2 if t2 > -1 else "EMPTY"))}
  {action_respond_info("T3: ID %s" % (t3 if t3 > -1 else "EMPTY"))}
  {action_respond_info("T4: ID %s" % (t4 if t4 > -1 else "EMPTY"))}
  {action_respond_info("T5: ID %s" % (t5 if t5 > -1 else "EMPTY"))}
  
  {action_respond_info("---------------------------------------")}

  
